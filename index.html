<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი პორტფოლიო</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; }
        
        /* ნავიგაცია */
        nav { background: #2d3436; padding: 20px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: #00cec9; }

        /* მთავარი სექცია */
        .hero { height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://source.unsplash.com/random/1600x900?technology'); background-size: cover; color: white; text-align: center; }
        .hero h1 { font-size: 4rem; margin-bottom: 10px; }
        
        /* კონტენტის ბლოკები */
        .container { padding: 50px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card h3 { color: #2d3436; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">მთავარი</a>
        <a href="about.html">ჩემს შესახებ</a>
        <a href="projects.html">პროექტები</a>
        <a href="contact.html">კონტაქტი</a>
    </nav>

    <div class="hero">
        <h1>მოგესალმებით!</h1>
        <p>მე ვარ დეველოპერი და ეს ჩემი სივრცეა.</p>
    </div>

    <div class="container">
        <div class="card">
            <h3>პროექტი 1</h3>
            <p>აქ შეგიძლიათ აღწეროთ თქვენი პირველი ნამუშევარი.</p>
        </div>
        <div class="card">
            <h3>პროექტი 2</h3>
            <p>მეორე საინტერესო პროექტის აღწერა აქ იქნება.</p>
        </div>
        <div class="card">
            <h3>უნარები</h3>
            <p>HTML, CSS, JavaScript და GitHub-ის მართვა.</p>
        </div>
    </div>

</body>
</html>

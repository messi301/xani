<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი ვებსაიტი</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: white; color: #764ba2; text-decoration: none; border-radius: 25px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>გამარჯობა! 👋</h1>
        <p>ეს ჩემი პირველი ვებსაიტია, რომელიც GitHub-ით ავამუშავე.</p>
        <a href="#" class="btn">დამიკავშირდით</a>
    </div>
</body>
</html>
